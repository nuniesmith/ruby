# =============================================================================
# Futures - CI/CD Pipeline
# =============================================================================
# Automated build, push, and deployment of Futures via Tailscale
#
# Pipeline: Lint → Test → Docker Build & Push (matrix)
#           → Deploy ALL services to Oryx (GPU rig)
#           → Health Checks
#
# Single deployment target:
#   Oryx Server   — Home GPU rig (RTX 3080 16GB, CUDA, 64 GB RAM):
#                   ALL services — postgres, redis, data, engine, web,
#                   charting, trainer, prometheus, grafana
#
# Single DockerHub repo (nuniesmith/futures) with tag-per-service:
#   nuniesmith/futures:engine          — Engine + Data API (amd64 + arm64)
#   nuniesmith/futures:web             — HTMX Dashboard (amd64 + arm64)
#   nuniesmith/futures:trainer         — GPU Training Server (amd64 only)
#   nuniesmith/futures:engine-<sha>    — Pinned engine build
#   nuniesmith/futures:web-<sha>       — Pinned web build
#   nuniesmith/futures:trainer-<sha>   — Pinned trainer build
#   nuniesmith/futures:latest          — Alias for :data (default pull)
#
# Required Secrets:
#   - TAILSCALE_OAUTH_CLIENT_ID: Tailscale OAuth Client ID
#   - TAILSCALE_OAUTH_SECRET: Tailscale OAuth Secret
#
#   Oryx Server (home GPU rig — all services):
#   - PROD_TAILSCALE_IP: Oryx server Tailscale IP
#   - PROD_SSH_KEY: SSH private key for oryx server
#   - PROD_SSH_USER: SSH username (default: actions)
#   - PROD_SSH_PORT: SSH port (default: 22)
#
#   Docker:
#   - DOCKER_USERNAME: Docker Hub username
#   - DOCKER_TOKEN: Docker Hub access token
#
#   Notifications:
#   - DISCORD_WEBHOOK_ACTIONS: Discord webhook for CI/CD notifications
#
#   API Keys (injected into prod .env on oryx server):
#   - XAI_API_KEY: xAI (Grok) API key
#   - MASSIVE_API_KEY: Massive API key
#   - KRAKEN_API_KEY: Kraken API key
#   - KRAKEN_API_SECRET: Kraken API secret
#   - API_KEY: Shared secret for web ↔ engine auth (X-API-Key header)
#   - TRAINER_API_KEY: Shared secret for engine ↔ trainer auth (Bearer token)
#   
# =============================================================================

name: 🚀 CI/CD Pipeline

on:
    push:
        branches: [main]
        paths-ignore:
            - "**.md"
            - "LICENSE"
            - ".gitignore"
            - "docs/**"
    pull_request:
        branches: [main]
    workflow_dispatch:
        inputs:
            skip_tests:
                description: "Skip tests (build only)"
                required: false
                type: boolean
                default: false
            skip_docker:
                description: "Skip Docker build (test only)"
                required: false
                type: boolean
                default: false
            skip_deploy:
                description: "Skip deployment (build only)"
                required: false
                type: boolean
                default: false

permissions:
    contents: read
    packages: write
    checks: write

env:
    PYTHON_VERSION: "3.13"
    REGISTRY: docker.io
    IMAGE_NAME: nuniesmith/futures

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

defaults:
    run:
        shell: bash

jobs:
    # =========================================================================
    # Stage 1: Lint & Format
    # =========================================================================
    lint:
        name: ✨ Lint & Format
        runs-on: ubuntu-latest
        timeout-minutes: 10
        if: ${{ !inputs.skip_tests }}
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 📣 Notify build started
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "🔨 Futures CI/CD Started"
                  description: "Running lint and format checks"
                  status: started
                  include-repo-info: "true"

            - name: 🐍 Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: 📦 Install linting tools
              run: |
                  python -m pip install --upgrade pip
                  pip install ruff mypy types-requests

            - name: ✨ Run Ruff linting
              run: |
                  echo "🔍 Running Ruff linter..."
                  ruff check . --output-format=github
                  ruff format --check .

            - name: 📦 Install project (for mypy to resolve imports)
              run: |
                  pip install -e ".[dev]" --no-deps 2>/dev/null || pip install -e . --no-deps 2>/dev/null || true

            - name: 🔍 Run mypy type check
              run: |
                  echo "🔍 Running mypy type checker..."
                  mypy src scripts

    # =========================================================================
    # Stage 2: Test
    # =========================================================================
    test:
        name: 🧪 Test
        runs-on: ubuntu-latest
        timeout-minutes: 20
        if: ${{ !inputs.skip_tests }}
        needs: lint
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 🐍 Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: "pip"

            - name: 📦 Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install pytest pytest-cov pytest-asyncio pytest-timeout
                  if [ -f pyproject.toml ]; then pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true; fi

            - name: 🧪 Run tests
              run: |
                  pytest --cov=. --cov-report=xml --cov-report=term-missing -v

            - name: ✅ Notify tests passed
              if: success()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "✅ Futures Tests Passed"
                  description: "All tests and lint checks passed"
                  status: success

            - name: ❌ Notify tests failed
              if: failure()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "❌ Futures Tests Failed"
                  description: "Tests or lint checks failed"
                  status: failure
                  fields: '[{"name": "Workflow", "value": "[View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}]'

    # =========================================================================
    # Stage 3: Build & Push Docker Images
    # =========================================================================
    #
    # Single DockerHub repo (nuniesmith/futures) with tag-per-service.
    # Each matrix entry produces two tags:
    #   :engine           (rolling latest for that service)
    #   :engine-abc1234   (pinned to commit SHA)
    # The data build also tags :latest as the default pull target.
    #
    # Builds run in parallel via matrix strategy:
    #   data       — FastAPI data service (arm64 + amd64)
    #   engine     — Background computation worker (arm64 + amd64)
    #   web        — HTMX dashboard reverse-proxy (arm64 + amd64)
    #   trainer    — GPU CNN training server (amd64 only — CUDA base image)
    #   charting   — TradingView charting server (arm64 + amd64)
    #   prometheus — Metrics collection (arm64 + amd64)
    #   grafana    — Dashboards (arm64 + amd64)
    # =========================================================================
    # =========================================================================
    # Stage 3a: Build and push the shared base image
    #
    # The data, engine, and web service Dockerfiles all start with
    # FROM nuniesmith/futures:base, which contains the full pyproject.toml
    # dependency set.  This job builds and pushes :base first so that the
    # parallel service matrix jobs can pull it as a cached layer instead of
    # each running their own pip install.
    #
    # This job is skipped (and the matrix falls back to a fresh pip install)
    # if skip_docker is set, matching the existing gate on the docker job.
    # =========================================================================
    docker-base:
        name: "🐳 Build :base (shared deps)"
        needs: test
        runs-on: ubuntu-latest
        timeout-minutes: 30
        if: |
            github.event_name == 'push' && github.ref == 'refs/heads/main'
            && (github.event_name != 'workflow_dispatch' || inputs.skip_docker != true)
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 🔢 Compute short SHA
              id: vars
              run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

            - name: 🐳 Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: 🔑 Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}

            - name: 🐳 Build and push :base
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: docker/base/Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: |
                      ${{ env.IMAGE_NAME }}:base
                      ${{ env.IMAGE_NAME }}:base-${{ steps.vars.outputs.sha_short }}
                  # Cache from/to registry so repeat builds reuse layers
                  # even across fresh GitHub Actions runners.
                  cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:base-buildcache
                  cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:base-buildcache,mode=max

            - name: ✅ Notify :base pushed
              if: success()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "🐳 :base Image Pushed"
                  description: "Shared Python deps base image pushed — service builds will inherit it"
                  status: success
                  fields: '[{"name": "Tags", "value": "`${{ env.IMAGE_NAME }}:base`\n`${{ env.IMAGE_NAME }}:base-${{ steps.vars.outputs.sha_short }}`", "inline": true}, {"name": "Platforms", "value": "`linux/amd64,linux/arm64`", "inline": true}]'

            - name: ❌ Notify :base build failed
              if: failure()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "❌ :base Docker Build Failed"
                  description: "Shared base image build failed — all service builds will be blocked"
                  status: failure
                  fields: '[{"name": "Dockerfile", "value": "`docker/base/Dockerfile`", "inline": true}, {"name": "Workflow", "value": "[View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}]'

    docker:
        name: "🐳 Build :${{ matrix.service }}"
        # Wait for the base image to be pushed before building any service.
        # The trainer job doesn't use the base image (separate CUDA deps) but
        # we still gate it here to keep all Docker pushes in a single wave.
        needs: [test, docker-base]
        runs-on: ubuntu-latest
        timeout-minutes: 60
        if: |
            github.event_name == 'push' && github.ref == 'refs/heads/main'
            && (github.event_name != 'workflow_dispatch' || inputs.skip_docker != true)
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: data
                      dockerfile: docker/data/Dockerfile
                      platforms: linux/amd64,linux/arm64
                      is_default: true
                      # Pulls FROM nuniesmith/futures:base — base must be pushed first
                      needs_base: true
                    - service: engine
                      dockerfile: docker/engine/Dockerfile
                      platforms: linux/amd64,linux/arm64
                      is_default: false
                      needs_base: true
                    - service: web
                      dockerfile: docker/web/Dockerfile
                      platforms: linux/amd64,linux/arm64
                      is_default: false
                      needs_base: true
                    - service: trainer
                      dockerfile: docker/trainer/Dockerfile
                      platforms: linux/amd64
                      is_default: false
                      # trainer uses its own CUDA base — does not need :base
                      needs_base: false
                    - service: prometheus
                      dockerfile: docker/monitoring/prometheus/Dockerfile
                      platforms: linux/amd64,linux/arm64
                      is_default: false
                      needs_base: false
                    - service: grafana
                      dockerfile: docker/monitoring/grafana/Dockerfile
                      platforms: linux/amd64,linux/arm64
                      is_default: false
                      needs_base: false
                    - service: charting
                      dockerfile: docker/charting/Dockerfile
                      platforms: linux/amd64,linux/arm64
                      is_default: false
                      needs_base: false
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 🔢 Compute short SHA
              id: vars
              run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

            - name: 🐳 Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: 🔑 Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}

            - name: 🐳 Build and Push — :${{ matrix.service }}
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ${{ matrix.dockerfile }}
                  platforms: ${{ matrix.platforms }}
                  push: true
                  tags: |
                      ${{ env.IMAGE_NAME }}:${{ matrix.service }}
                      ${{ env.IMAGE_NAME }}:${{ matrix.service }}-${{ steps.vars.outputs.sha_short }}
                      ${{ matrix.is_default == 'true' && format('{0}:latest', env.IMAGE_NAME) || '' }}
                  # For services that inherit from :base, pull the registry cache
                  # so the FROM nuniesmith/futures:base layer resolves immediately
                  # from the registry without re-downloading the 700 MB site-packages.
                  cache-from: |
                      ${{ matrix.needs_base && format('type=registry,ref={0}:base-buildcache', env.IMAGE_NAME) || '' }}
                      type=registry,ref=${{ env.IMAGE_NAME }}:${{ matrix.service }}-buildcache
                  cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:${{ matrix.service }}-buildcache,mode=max

            - name: ✅ Notify :${{ matrix.service }} pushed
              if: success()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "🐳 :${{ matrix.service }} Image Pushed"
                  description: "Docker image pushed to Docker Hub"
                  status: success
                  fields: '[{"name": "Tags", "value": "`${{ env.IMAGE_NAME }}:${{ matrix.service }}`\n`${{ env.IMAGE_NAME }}:${{ matrix.service }}-${{ steps.vars.outputs.sha_short }}`", "inline": true}, {"name": "Platforms", "value": "`${{ matrix.platforms }}`", "inline": true}]'

            - name: ❌ Notify :${{ matrix.service }} build failed
              if: failure()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "❌ :${{ matrix.service }} Docker Build Failed"
                  description: "Failed to build or push :${{ matrix.service }} image"
                  status: failure
                  fields: '[{"name": "Dockerfile", "value": "`${{ matrix.dockerfile }}`", "inline": true}, {"name": "Workflow", "value": "[View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}]'

    # =========================================================================
    # Stage 4: Deploy ALL services to Oryx (home GPU rig via Tailscale)
    # =========================================================================
    #
    # Connects to the Oryx server (RTX 3080 16GB, 64 GB RAM) over Tailscale
    # VPN, then uses the shared ssh-deploy action to pull ALL freshly-pushed
    # images and restart every service via docker compose.
    #
    # All services run on a single machine:
    #   postgres, redis     — infrastructure
    #   data, engine, web   — core application
    #   charting            — TradingView charts
    #   trainer             — GPU CNN training (NVIDIA / CUDA)
    #   prometheus, grafana — monitoring
    #
    # The trainer service uses the docker compose `training` profile and
    # requires nvidia-container-toolkit on the host. Since Oryx has an
    # NVIDIA GPU, we start it with --profile training.
    #
    # Gates:
    #   - Only runs on push to main (same gate as docker stage)
    #   - Only runs after ALL docker matrix jobs succeed
    #   - Can be skipped manually via workflow_dispatch skip_deploy input
    #
    # Secrets — accepts both new ORYX_* names and legacy PROD_*/TRAINER_*
    # names so existing repo secrets work without renaming:
    #   PROD_TAILSCALE_IP  (fallback: TRAINER_TAILSCALE_IP → PROD_TAILSCALE_IP)
    #   PROD_SSH_KEY       (fallback: TRAINER_SSH_KEY → PROD_SSH_KEY)
    #   PROD_SSH_USER      (fallback: PROD_SSH_USER → 'actions')
    #   PROD_SSH_PORT      (fallback: PROD_SSH_PORT → '22')
    # =========================================================================
    deploy:
        name: "🦌 Deploy ALL to Oryx"
        needs: [docker, docker-base]
        runs-on: ubuntu-latest
        timeout-minutes: 20
        if: |
            github.ref == 'refs/heads/main'
            && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
            && inputs.skip_deploy != true
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 🔢 Compute short SHA
              id: vars
              run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

            - name: 🔑 Resolve Oryx connection secrets
              id: oryx
              run: |
                  # Resolve IP — prefer PROD_TAILSCALE_IP, fall back to TRAINER or PROD
                  IP="${ORYX_IP:-${TRAINER_IP:-${PROD_IP:-}}}"
                  if [ -z "$IP" ]; then
                    echo "❌ No Oryx IP found — set PROD_TAILSCALE_IP, TRAINER_TAILSCALE_IP, or PROD_TAILSCALE_IP"
                    exit 1
                  fi
                  echo "ip=$IP" >> "$GITHUB_OUTPUT"

                  # Resolve SSH port
                  PORT="${ORYX_PORT:-${PROD_PORT:-22}}"
                  echo "port=$PORT" >> "$GITHUB_OUTPUT"

                  # Resolve SSH user
                  USER="${ORYX_USER:-${PROD_USER:-actions}}"
                  echo "user=$USER" >> "$GITHUB_OUTPUT"

                  echo "✅ Oryx target: $USER@$IP:$PORT"
              env:
                  ORYX_IP: ${{ secrets.PROD_TAILSCALE_IP }}
                  TRAINER_IP: ${{ secrets.TRAINER_TAILSCALE_IP }}
                  PROD_IP: ${{ secrets.PROD_TAILSCALE_IP }}
                  ORYX_PORT: ${{ secrets.PROD_SSH_PORT }}
                  PROD_PORT: ${{ secrets.PROD_SSH_PORT }}
                  ORYX_USER: ${{ secrets.PROD_SSH_USER }}
                  PROD_USER: ${{ secrets.PROD_SSH_USER }}

            - name: 🔌 Connect to Tailscale
              id: tailscale
              uses: nuniesmith/actions/.github/actions/tailscale-connect@main
              with:
                  oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
                  target-ip: ${{ steps.oryx.outputs.ip }}
                  target-ssh-port: ${{ steps.oryx.outputs.port }}

            - name: 🦌 Deploy to Oryx via SSH
              id: deploy
              if: steps.tailscale.outputs.connected == 'true'
              uses: nuniesmith/actions/.github/actions/ssh-deploy@main
              with:
                  host: ${{ steps.oryx.outputs.ip }}
                  port: ${{ steps.oryx.outputs.port }}
                  username: ${{ steps.oryx.outputs.user }}
                  ssh-key: ${{ secrets.PROD_SSH_KEY || secrets.TRAINER_SSH_KEY || secrets.PROD_SSH_KEY }}
                  project-path: ~/futures
                  git-pull: false
                  git-branch: main
                  docker-prune: false
                  pre-deploy-command: |
                      set -euo pipefail
                      echo "📦 Preparing Futures deployment on Oryx server..."
                      echo "   Target: ALL services (infra + app + trainer + monitoring)"

                      PROJ_DIR="$HOME/futures"

                      # Handle git repository setup
                      if [ ! -d "$PROJ_DIR/.git" ]; then
                        if [ -d "$PROJ_DIR" ]; then
                          echo "📁 Directory exists but is not a git repo — initializing..."
                          cd "$PROJ_DIR"
                          git init
                          git remote add origin https://github.com/${{ github.repository }}.git
                          git fetch origin
                          git checkout -f main
                          git branch --set-upstream-to=origin/main main
                        else
                          echo "📥 First deployment — cloning repository..."
                          git clone https://github.com/${{ github.repository }}.git "$PROJ_DIR"
                        fi
                      else
                        echo "📥 Force-syncing to origin/main..."
                        cd "$PROJ_DIR"
                        git fetch origin
                        git checkout main
                        # Hard reset — this is a deployment target, not a dev machine.
                        # Ensures local modifications or a partially applied pull never
                        # leave the server on a stale commit.
                        git reset --hard origin/main
                        echo "✅ Now at: $(git log --oneline -1)"
                      fi

                      # Confirm the compose file on disk matches what we expect
                      cd "$PROJ_DIR"
                      echo "📄 docker-compose.yml services on disk:"
                      grep -E "^    [a-z]" docker-compose.yml | grep -v "^    #" || true

                      # Ensure scripts are executable
                      find "$PROJ_DIR" -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true

                      # Create .env file if it doesn't exist
                      if [ ! -f ".env" ]; then
                        echo "📝 Creating default .env..."
                        cat > .env <<'ENVEOF'
                      # Futures Environment Configuration — Oryx Server
                      PYTHONUNBUFFERED=1
                      LOG_LEVEL=info
                      ENVEOF
                        chmod 600 .env
                        echo "✅ Created .env file"
                      fi

                      # Generate database passwords once — never overwrite existing values
                      # so that a redeployment doesn't break a live database
                      generate_env_secret() {
                        local key="$1"
                        if ! grep -q "^${key}=" .env 2>/dev/null; then
                          local val
                          val="$(openssl rand -base64 32 | tr -d '/+=' | head -c 40)"
                          echo "${key}=${val}" >> .env
                          echo "🔑 Generated ${key}"
                        else
                          echo "🔑 ${key} already set — skipping"
                        fi
                      }
                      generate_env_secret "POSTGRES_PASSWORD"
                      generate_env_secret "REDIS_PASSWORD"
                      chmod 600 .env
                      echo "✅ Database secrets ready"

                      # Upsert API keys — always overwrite so rotated secrets stay current
                      echo "🔑 Injecting API keys into .env..."
                      upsert_env() {
                        local key="$1" val="$2"
                        if grep -q "^${key}=" .env 2>/dev/null; then
                          sed -i "s|^${key}=.*|${key}=${val}|" .env
                        else
                          echo "${key}=${val}" >> .env
                        fi
                      }

                      # External API keys
                      upsert_env "XAI_API_KEY"          "${{ secrets.XAI_API_KEY }}"
                      upsert_env "MASSIVE_API_KEY"       "${{ secrets.MASSIVE_API_KEY }}"
                      upsert_env "KRAKEN_API_KEY"        "${{ secrets.KRAKEN_API_KEY }}"
                      upsert_env "KRAKEN_API_SECRET"     "${{ secrets.KRAKEN_API_SECRET }}"

                      # Inter-service auth keys
                      upsert_env "API_KEY"               "${{ secrets.API_KEY }}"
                      upsert_env "TRAINER_API_KEY"       "${{ secrets.TRAINER_API_KEY }}"

                      # Trainer connects to the local data service (same host)
                      # In docker-compose.yml the trainer uses http://data:8000 via
                      # Docker networking, but we also set these for any scripts that
                      # run outside Docker on the host.
                      upsert_env "TRAINER_SERVICE_URL"   "http://localhost:8200"
                      upsert_env "ENGINE_DATA_URL"       "http://data:8000"

                      # Discord notifications
                      upsert_env "DISCORD_WEBHOOK_URL"   "${{ secrets.DISCORD_WEBHOOK_URL }}"

                      chmod 600 .env
                      echo "✅ API keys injected"

                      # Create required directories
                      echo "📁 Ensuring data directories exist..."
                      mkdir -p data config models dataset scripts
                      chmod 755 data config models dataset scripts
                      echo "✅ Directories ready"

                      # Verify NVIDIA GPU is available (trainer needs it)
                      echo ""
                      echo "🎮 GPU check:"
                      nvidia-smi --query-gpu=name,memory.total,driver_version --format=csv,noheader 2>/dev/null || echo "⚠️ nvidia-smi not available (GPU may still work in container)"

                  deploy-command: |
                      set -euo pipefail
                      PROJ_DIR="$HOME/futures"
                      cd "$PROJ_DIR"

                      # Sanity-check: confirm docker-compose.yml is present and readable
                      echo "📂 Working directory: $(pwd)"
                      echo "📄 Compose file check:"
                      ls -la "$PROJ_DIR/docker-compose.yml" || { echo "❌ docker-compose.yml not found in $PROJ_DIR"; exit 1; }

                      # Alias — always use explicit -f and --project-directory so the
                      # correct file is used regardless of shell CWD or Docker context.
                      # Include --profile training to bring up the trainer service.
                      DC="docker compose --project-directory $PROJ_DIR -f $PROJ_DIR/docker-compose.yml --profile training"

                      # Validate the compose config before doing anything destructive
                      echo "🔍 Validating compose config..."
                      $DC config --services
                      echo "✅ Compose config valid"

                      # Remove stale docker-compose.prod.yml if it exists — we use docker-compose.yml exclusively
                      if [ -f "$PROJ_DIR/docker-compose.prod.yml" ]; then
                        echo "🧹 Removing stale docker-compose.prod.yml..."
                        rm -f "$PROJ_DIR/docker-compose.prod.yml"
                      fi

                      # Stop ALL existing services (including trainer)
                      echo "🐳 Stopping existing services..."
                      $DC down 2>/dev/null || true
                      # Also stop any standalone trainer compose instances
                      docker compose -f "$PROJ_DIR/docker-compose.trainer.yml" down 2>/dev/null || true

                      # Log in to Docker Hub and pull ALL service images
                      echo "🐳 Pulling latest images from Docker Hub..."
                      echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin 2>/dev/null || true

                      echo "==> Pulling :data image..."
                      docker pull ${{ env.IMAGE_NAME }}:data

                      echo "==> Pulling :engine image..."
                      docker pull ${{ env.IMAGE_NAME }}:engine

                      echo "==> Pulling :web image..."
                      docker pull ${{ env.IMAGE_NAME }}:web

                      echo "==> Pulling :trainer image..."
                      docker pull ${{ env.IMAGE_NAME }}:trainer

                      echo "==> Pulling :charting image..."
                      docker pull ${{ env.IMAGE_NAME }}:charting

                      echo "==> Pulling :prometheus image..."
                      docker pull ${{ env.IMAGE_NAME }}:prometheus

                      echo "==> Pulling :grafana image..."
                      docker pull ${{ env.IMAGE_NAME }}:grafana

                      # Start ALL services including the GPU trainer.
                      # --profile training activates the trainer service.
                      # postgres and redis must be listed explicitly — when service names are
                      # given, Compose does NOT auto-start depends_on targets that aren't running.
                      echo "🚀 Starting ALL services on Oryx..."
                      echo "   Infrastructure: postgres, redis"
                      echo "   Application:    data, engine, web, charting"
                      echo "   Training:       trainer (GPU / CUDA)"
                      echo "   Monitoring:     prometheus, grafana"
                      $DC up -d --no-build --remove-orphans postgres redis data engine web charting trainer prometheus grafana

                  post-deploy-command: |
                      set -euo pipefail
                      PROJ_DIR="$HOME/futures"
                      cd "$PROJ_DIR"
                      DC="docker compose --project-directory $PROJ_DIR -f $PROJ_DIR/docker-compose.yml --profile training"

                      echo ""
                      echo "📊 Container status (all services):"
                      $DC ps 2>/dev/null || \
                        docker ps --filter "name=futures" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

                      echo ""
                      echo "📊 Storage usage:"
                      df -h / | grep -v Filesystem
                      docker system df 2>/dev/null || true

                      echo ""
                      echo "🧹 Pruning dangling Docker images..."
                      $DC images --quiet 2>/dev/null || true
                      docker image prune -f 2>/dev/null || true

                      echo ""
                      echo "🎮 GPU status:"
                      nvidia-smi 2>/dev/null || echo "nvidia-smi not available on host"

                      echo ""
                      echo "🎯 Architecture:"
                      uname -m
                      docker info --format '{{.Architecture}}' 2>/dev/null || true

                      # Quick smoke test — verify key services respond
                      echo ""
                      echo "🏥 Quick health probes..."
                      for svc_port in "data:8050" "engine:8100" "web:8080" "trainer:8200"; do
                        svc="${svc_port%%:*}"
                        port="${svc_port##*:}"
                        if curl -sf --max-time 5 "http://localhost:${port}/health" > /dev/null 2>&1; then
                          echo "  ✅ ${svc} (port ${port}) — healthy"
                        else
                          echo "  ⏳ ${svc} (port ${port}) — still starting (may need more time)"
                        fi
                      done

                      echo ""
                      echo "✅ Oryx deployment complete! All services deployed."

            - name: 🏥 Run Health Checks
              id: health-checks
              if: always() && steps.deploy.outcome == 'success'
              uses: nuniesmith/actions/.github/actions/health-check@main
              with:
                  containers: futures
                  ssh-host: ${{ steps.oryx.outputs.ip }}
                  ssh-port: ${{ steps.oryx.outputs.port }}
                  ssh-user: ${{ steps.oryx.outputs.user }}
                  ssh-key: ${{ secrets.PROD_SSH_KEY || secrets.TRAINER_SSH_KEY || secrets.PROD_SSH_KEY }}
                  initial-delay: 30
                  retry-count: 4
                  retry-delay: 15
                  fail-on-unhealthy: false

            - name: 📣 Notify deployment
              if: always()
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              continue-on-error: true
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "${{ steps.deploy.outcome == 'success' && '🦌 Futures Deployed to Oryx' || '❌ Futures Oryx Deploy Failed' }}"
                  description: "${{ steps.deploy.outcome == 'success' && 'All services updated on Oryx server (data + engine + web + trainer + monitoring)' || 'Failed to deploy Futures to Oryx server' }}"
                  status: ${{ steps.deploy.outcome == 'success' && 'success' || 'failure' }}
                  include-repo-info: "true"
                  fields: |
                      [
                        {"name": "Platform", "value": "🦌 Oryx GPU Rig (amd64 / CUDA)", "inline": true},
                        {"name": "Services", "value": "`data` · `engine` · `web`\n`trainer` · `charting`\n`prometheus` · `grafana`", "inline": true},
                        {"name": "Commit", "value": "`${{ steps.vars.outputs.sha_short }}`", "inline": true},
                        {"name": "Network", "value": "🔒 Tailscale VPN", "inline": true},
                        {"name": "Health", "value": "${{ steps.health-checks.outputs.healthy == 'true' && '✅ Healthy' || '⚠️ Check logs' }}", "inline": true},
                        {"name": "GPU", "value": "🎮 RTX 3080 16GB", "inline": true}
                      ]

    # =========================================================================
    # Pipeline Summary
    # =========================================================================
    summary:
        name: "📊 Pipeline Summary"
        runs-on: ubuntu-latest
        timeout-minutes: 5
        needs: [lint, test, docker-base, docker, deploy]
        if: always()
        steps:
            - name: 📊 Generate summary
              run: |
                  SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)

                  echo "## 📊 Futures CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
                  echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
                  echo "| ✨ Lint & Format | \`${{ needs.lint.result }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🧪 Test | \`${{ needs.test.result }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🐳 Build :base (shared deps) | \`${{ needs.docker-base.result }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🐳 Docker Build & Push | \`${{ needs.docker.result }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🦌 Deploy ALL to Oryx | \`${{ needs.deploy.result }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  if [ "${{ needs.lint.result }}" = "success" ] && \
                     [ "${{ needs.test.result }}" = "success" ] && \
                     [ "${{ needs.docker.result }}" = "success" ]; then
                    DEPLOY="${{ needs.deploy.result }}"
                    if [ "$DEPLOY" = "success" ]; then
                      echo "### ✅ All stages completed — Oryx fully updated!" >> $GITHUB_STEP_SUMMARY
                      echo "" >> $GITHUB_STEP_SUMMARY
                      echo "All services deployed: data, engine, web, trainer, charting, prometheus, grafana" >> $GITHUB_STEP_SUMMARY
                    elif [ "$DEPLOY" = "failure" ]; then
                      echo "### ❌ Deploy to Oryx failed — check Tailscale / SSH secrets" >> $GITHUB_STEP_SUMMARY
                      echo "" >> $GITHUB_STEP_SUMMARY
                      echo "Verify PROD_TAILSCALE_IP (or TRAINER_TAILSCALE_IP) and PROD_SSH_KEY (or TRAINER_SSH_KEY) are set." >> $GITHUB_STEP_SUMMARY
                    elif [ "$DEPLOY" = "skipped" ]; then
                      echo "### ✅ Build + test passed (deploy skipped)" >> $GITHUB_STEP_SUMMARY
                    else
                      echo "### ✅ Build passed — Deploy: ${DEPLOY}" >> $GITHUB_STEP_SUMMARY
                    fi
                  elif [ "${{ needs.lint.result }}" = "failure" ]; then
                    echo "### ❌ Pipeline failed at lint stage" >> $GITHUB_STEP_SUMMARY
                    echo "Fix linting/formatting errors before proceeding." >> $GITHUB_STEP_SUMMARY
                  elif [ "${{ needs.test.result }}" = "failure" ]; then
                    echo "### ❌ Pipeline failed at test stage" >> $GITHUB_STEP_SUMMARY
                    echo "Fix failing tests before deployment can proceed." >> $GITHUB_STEP_SUMMARY
                  elif [ "${{ needs.docker-base.result }}" = "failure" ]; then
                    echo "### ❌ Pipeline failed at base image build stage" >> $GITHUB_STEP_SUMMARY
                    echo "Check docker/base/Dockerfile and pyproject.toml." >> $GITHUB_STEP_SUMMARY
                  elif [ "${{ needs.docker.result }}" = "failure" ]; then
                    echo "### ❌ Pipeline failed at Docker build stage" >> $GITHUB_STEP_SUMMARY
                    echo "Check Dockerfiles and build configuration." >> $GITHUB_STEP_SUMMARY
                  elif [ "${{ needs.docker.result }}" = "skipped" ]; then
                    echo "### ⏭️ Docker build skipped" >> $GITHUB_STEP_SUMMARY
                    echo "Docker builds only run on push to main." >> $GITHUB_STEP_SUMMARY
                  fi

                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "### 🐳 Docker Tags" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Service | Tag | Pinned Tag | Platforms | Deploy Target |" >> $GITHUB_STEP_SUMMARY
                  echo "|---------|-----|------------|-----------|---------------|" >> $GITHUB_STEP_SUMMARY
                  echo "| Data | \`${{ env.IMAGE_NAME }}:data\` | \`:data-${SHA_SHORT}\` | amd64, arm64 | 🦌 Oryx |" >> $GITHUB_STEP_SUMMARY
                  echo "| Engine | \`${{ env.IMAGE_NAME }}:engine\` | \`:engine-${SHA_SHORT}\` | amd64, arm64 | 🦌 Oryx |" >> $GITHUB_STEP_SUMMARY
                  echo "| Web | \`${{ env.IMAGE_NAME }}:web\` | \`:web-${SHA_SHORT}\` | amd64, arm64 | 🦌 Oryx |" >> $GITHUB_STEP_SUMMARY
                  echo "| Trainer | \`${{ env.IMAGE_NAME }}:trainer\` | \`:trainer-${SHA_SHORT}\` | amd64 | 🦌 Oryx (GPU) |" >> $GITHUB_STEP_SUMMARY
                  echo "| Charting | \`${{ env.IMAGE_NAME }}:charting\` | \`:charting-${SHA_SHORT}\` | amd64, arm64 | 🦌 Oryx |" >> $GITHUB_STEP_SUMMARY
                  echo "| Prometheus | \`${{ env.IMAGE_NAME }}:prometheus\` | \`:prometheus-${SHA_SHORT}\` | amd64, arm64 | 🦌 Oryx |" >> $GITHUB_STEP_SUMMARY
                  echo "| Grafana | \`${{ env.IMAGE_NAME }}:grafana\` | \`:grafana-${SHA_SHORT}\` | amd64, arm64 | 🦌 Oryx |" >> $GITHUB_STEP_SUMMARY
                  echo "| Base (shared deps) | \`${{ env.IMAGE_NAME }}:base\` | \`:base-${SHA_SHORT}\` | amd64, arm64 | — (build only) |" >> $GITHUB_STEP_SUMMARY
                  echo "| Default (:latest) | \`${{ env.IMAGE_NAME }}:latest\` | — | amd64, arm64 | 🦌 Oryx |" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
                  echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
                  echo "| 🐍 Python | \`${{ env.PYTHON_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| 📦 Repo | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🌿 Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🔗 Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🦌 Target | Oryx (RTX 3080 16GB, 64 GB RAM) |" >> $GITHUB_STEP_SUMMARY

            - name: ❌ Fail on critical errors
              if: needs.lint.result == 'failure' || needs.test.result == 'failure' || needs.docker-base.result == 'failure' || needs.docker.result == 'failure' || needs.deploy.result == 'failure'
              run: |
                  echo "❌ Pipeline had failures"
                  echo "  Lint:        ${{ needs.lint.result }}"
                  echo "  Test:        ${{ needs.test.result }}"
                  echo "  Base image:  ${{ needs.docker-base.result }}"
                  echo "  Docker:      ${{ needs.docker.result }}"
                  echo "  Deploy:      ${{ needs.deploy.result }}"
                  exit 1
