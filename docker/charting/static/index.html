<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ruby Futures · Chart</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- ── Top bar ──────────────────────────────────────────────────────── -->
    <header class="topbar">
        <div class="topbar-left">
            <span class="logo">◆ Ruby Futures</span>
            <span class="divider">|</span>
            <span id="status-dot" class="status-dot status-connecting" title="Data service connection"></span>
            <span id="status-label" class="status-label">Connecting…</span>
        </div>

        <div class="topbar-center">
            <!-- Symbol selector — populated by chart.js from /bars/assets -->
            <div class="symbol-tabs" id="symbol-tabs" role="tablist" aria-label="Asset">
                <span class="tab-loading">Loading assets…</span>
            </div>
        </div>

        <div class="topbar-right">
            <!-- Interval selector -->
            <div class="interval-tabs" id="interval-tabs" role="tablist" aria-label="Interval">
                <button class="interval-btn" data-interval="1m"  role="tab">1m</button>
                <button class="interval-btn" data-interval="5m"  role="tab">5m</button>
                <button class="interval-btn active" data-interval="15m" role="tab" aria-selected="true">15m</button>
                <button class="interval-btn" data-interval="1h"  role="tab">1h</button>
                <button class="interval-btn" data-interval="1d"  role="tab">1d</button>
            </div>

            <!-- Days-back selector -->
            <select id="days-back" class="days-select" aria-label="Lookback period">
                <option value="1">1 day</option>
                <option value="5">5 days</option>
                <option value="14" selected>14 days</option>
                <option value="30">30 days</option>
                <option value="90">90 days</option>
            </select>

            <!-- Indicator toggles -->
            <div class="indicator-tabs" role="group" aria-label="Indicators">
                <button class="ind-btn active" data-ind="ema9"         title="Exponential Moving Average (9)">EMA9</button>
                <button class="ind-btn active" data-ind="ema21"        title="Exponential Moving Average (21)">EMA21</button>
                <button class="ind-btn"        data-ind="bb"           title="Bollinger Bands (20, 2σ)">BB</button>
                <button class="ind-btn"        data-ind="vwap"         title="VWAP with ±1σ / ±2σ bands (daily reset)">VWAP</button>
                <button class="ind-btn"        data-ind="rsi"          title="Relative Strength Index (14) — shown below price">RSI</button>
                <button class="ind-btn"        data-ind="cvd"          title="Cumulative Volume Delta — shown below price">CVD</button>
                <button class="ind-btn"        data-ind="vp"           title="Volume Profile — POC / VAH / VAL (100-bar rolling)">VP</button>
                <button class="ind-btn"        data-ind="avwap_session" title="Anchored VWAP — session open">AVWAP-S</button>
                <button class="ind-btn"        data-ind="avwap_prevday" title="Anchored VWAP — previous day low">AVWAP-P</button>
            </div>

            <!-- Live toggle -->
            <label class="live-toggle" title="Subscribe to live bar updates via SSE">
                <input type="checkbox" id="live-toggle" checked />
                <span class="toggle-track">
                    <span class="toggle-thumb"></span>
                </span>
                <span class="toggle-label">Live</span>
            </label>
        </div>
    </header>

    <!-- ── Chart area ───────────────────────────────────────────────────── -->
    <main class="chart-wrap" id="chart-wrap">
        <!-- Loading overlay -->
        <div id="chart-overlay" class="chart-overlay">
            <div class="spinner"></div>
            <p id="overlay-msg" class="overlay-msg">Loading bars…</p>
        </div>

        <!-- Error banner (hidden by default) -->
        <div id="error-banner" class="error-banner hidden">
            <span id="error-text"></span>
            <button id="error-dismiss" aria-label="Dismiss">✕</button>
        </div>

        <!-- Primary chart — candlestick + volume + overlaid indicators (single ApexCharts instance) -->
        <div id="chart" class="chart-container"></div>

        <!-- RSI sub-pane — separate ApexCharts instance, shown only when RSI indicator is active -->
        <div id="chart-rsi" class="chart-rsi hidden"></div>

        <!-- CVD sub-pane — separate ApexCharts instance, shown only when CVD indicator is active -->
        <div id="chart-cvd" class="chart-cvd hidden"></div>
    </main>

    <!-- ── Bottom status bar ────────────────────────────────────────────── -->
    <footer class="statusbar">
        <span id="bar-count"   class="stat">— bars</span>
        <span class="divider">·</span>
        <span id="last-price"  class="stat">— last</span>
        <span class="divider">·</span>
        <span id="last-change" class="stat">—</span>
        <span class="divider">·</span>
        <span id="last-ts"     class="stat">—</span>
        <span class="divider flex-spacer"></span>
        <span id="sse-status"  class="stat sse-badge">SSE off</span>
    </footer>

    <!-- ApexCharts (UMD build — exposes window.ApexCharts) -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.54.0/dist/apexcharts.min.js"></script>
    <script src="chart.js"></script>
</body>
</html>
